<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum de Benjamín Atoche | BenjiCode</title>
  <meta name="description" content="Curriculum vitae de Benjamín Atoche (BenjiCode): experiencia full stack, automatización y desarrollo de productos listos para producción.">
  <link rel="canonical" href="https://benjicode.com/curriculum/">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    html, body { height: 100%; margin: 0; }
    body.pdf-fullpage { background: #1b1b1b; }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .pdf-embed {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
      background: #1b1b1b;
    }
    .pdf-fallback {
      color: #e8eefc;
      text-align: center;
      padding: 24px;
      font-family: "Manrope", system-ui, sans-serif;
    }
    .pdf-fallback a { color: #5dd6ff; }
  </style>
</head>
<body class="pdf-fullpage">
  <h1 class="visually-hidden">Curriculum de Benjamín Atoche</h1>
  <object data="CV_BENJAMIN_ATOCHE.pdf#toolbar=1&navpanes=0&scrollbar=1" type="application/pdf" class="pdf-embed">
    <iframe src="CV_BENJAMIN_ATOCHE.pdf" class="pdf-embed" title="Curriculum de Benjamín Atoche"></iframe>
    <div class="pdf-fallback">
      No se pudo cargar el PDF. <a href="CV_BENJAMIN_ATOCHE.pdf">Descargar curriculum.pdf</a>
    </div>
  </object>

  <script>
    // Intercept Ctrl+S / Cmd+S and Ctrl+P / Cmd+P
    window.addEventListener('keydown', function(e) {
      const isCmdOrCtrl = e.ctrlKey || e.metaKey;
      
      if (isCmdOrCtrl && e.key.toLowerCase() === 's') {
        e.preventDefault();
        downloadPDF();
      }
      
      if (isCmdOrCtrl && e.key.toLowerCase() === 'p') {
        e.preventDefault();
        printPDF();
      }
    });

    function downloadPDF() {
      const link = document.createElement('a');
      link.href = 'CV_BENJAMIN_ATOCHE.pdf';
      link.download = 'CV_BENJAMIN_ATOCHE.pdf';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function printPDF() {
      let printFrame = document.getElementById('pdf-print-frame');
      if (!printFrame) {
        printFrame = document.createElement('iframe');
        printFrame.id = 'pdf-print-frame';
        printFrame.style.visibility = 'hidden';
        printFrame.style.position = 'fixed';
        printFrame.style.right = '0';
        printFrame.style.bottom = '0';
        printFrame.style.width = '0';
        printFrame.style.height = '0';
        printFrame.style.border = '0';
        document.body.appendChild(printFrame);
      }
      
      printFrame.src = 'CV_BENJAMIN_ATOCHE.pdf';
      
      printFrame.onload = function() {
        setTimeout(function() {
          printFrame.contentWindow.focus();
          printFrame.contentWindow.print();
        }, 250);
      };
    }
  </script>
</body>
</html>
